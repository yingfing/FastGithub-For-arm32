name: Build FastGithub for ARM

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish for linux-arm (no GUI)
        run: |
          dotnet publish FastGithub/FastGithub.csproj \
            -c Release -r linux-arm -o ./dist \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Upload artifact (binary)
        uses: actions/upload-artifact@v4
        with:
          name: fastgithub-arm-binary
          path: ./dist/FastGithub

      - name: Package entire project (exclude unnecessary files)
        run: |
          # 打包整个仓库，排除 .git、bin、obj、publish、dist（但保留 dist/FastGithub 已在之前单独上传）
          zip -r FastGithub-full.zip . \
            -x "*.git*" \
            -x "*/bin/*" \
            -x "*/obj/*" \
            -x "*/publish/*" \
            -x "*/dist/*" \
            -x ".github/*" \
            -x "*.user" \
            -x "*.suo"

      - name: Upload artifact (full project)
        uses: actions/upload-artifact@v4
        with:
          name: fastgithub-full-project
          path: FastGithub-full.zip

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: arm-build-${{ github.run_number }}
          name: FastGithub ARM Build ${{ github.run_number }}
          body: |
            Automated build of FastGithub for ARM (linux-arm).
            - **FastGithub**: compiled ARMv7 binary, ready to run on OneCloud.
            - **FastGithub-full.zip**: complete source code + project files (excluding build temp).
            Usage: ./FastGithub
            Default proxy port: 38457
          files: |
            ./dist/FastGithub
            FastGithub-full.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
